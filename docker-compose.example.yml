services:
  zephyr-sdk:
    image: zephyr-docker-sdk:1.0.1
    container_name: ${CONTAINER_NAME:-zephyr-sdk-dev}
    working_dir: /workspace
    volumes:
      - ${ZEPHYR_WORKSPACE:?Set ZEPHYR_WORKSPACE to your host Zephyr workspace path}:/workspace/zephyr-workspace
      - zephyr-sdk-ccache:/home/zephyr/.ccache
    environment:
      ZEPHYR_BASE: ${ZEPHYR_BASE:?Set ZEPHYR_BASE to the Zephyr repository path inside the container}
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-${ZSDK_VERSION:-1.0.1}
      CCACHE_DIR: /home/zephyr/.ccache
      SYNC_ZEPHYR_REQUIREMENTS: ${SYNC_ZEPHYR_REQUIREMENTS:-1}
    stdin_open: true
    tty: true

volumes:
  zephyr-sdk-ccache:
